name: autism_audiobook
description: "Autism-friendly audiobook app for children and caregivers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Network / API
  http: ^1.2.2

  # Audio playback
  just_audio: ^0.9.42
  audio_session: ^0.1.21

  # Image picking for per-page storybook upload
  image_picker: ^1.1.2

  # Persistent disk cache for audiobook page illustrations + thumbnails. The
  # backend stores them as static files under storage/, but every Image
  # widget call still goes through a real HTTP request to the emulator's
  # 10.0.2.2:8000 — the default in-memory cache evicts under pressure and
  # disappears on app restart. cached_network_image keeps a disk cache so
  # the second visit is instant.
  cached_network_image: ^3.4.1

  # Audio file picking for the whole-book narration upload
  file_picker: ^8.0.0+1

  # Typography
  google_fonts: ^6.2.1

  # Local storage / secure PIN
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Pin entry UI
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
